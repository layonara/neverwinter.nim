name: Build and Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nim
        uses: jiro4989/setup-nim-action@v2
        with:
          nim-version: '2.2.0'

      - name: Build all tools
        run: nimble install -y

      - name: Package binaries
        run: |
          mkdir -p dist
          cp ~/.nimble/bin/nwn_* dist/
          cd dist
          tar czf ../neverwinter-tools-linux-x64.tar.gz .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neverwinter-tools-linux-x64
          path: neverwinter-tools-linux-x64.tar.gz

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: neverwinter-tools-linux-x64.tar.gz
          generate_release_notes: true
